name: update-xdb

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional upstream release tag (defaults to latest)"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: update-xdb
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve upstream release tag
        id: upstream
        run: |
          set -euo pipefail
          upstream_tag=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            upstream_tag="${{ inputs.release_tag }}"
          fi
          if [ -z "$upstream_tag" ] || [ "$upstream_tag" = "null" ]; then
            upstream_tag="$(curl -fsSL https://api.github.com/repos/P3TERX/GeoLite.mmdb/releases/latest | jq -r '.tag_name')"
          fi
          if [ -z "$upstream_tag" ] || [ "$upstream_tag" = "null" ]; then
            echo "Failed to resolve upstream release tag" >&2
            exit 1
          fi
          echo "upstream_tag=$upstream_tag" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: release_exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.upstream.outputs.upstream_tag }}"
          api_url="https://api.github.com/repos/${{ github.repository }}/releases/tags/${tag}"
          status_code="$(curl -sS -o /tmp/release_check.json -w '%{http_code}' \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            "$api_url")"

          if [ "$status_code" = "200" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $tag already exists, skipping build."
          elif [ "$status_code" = "404" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $tag not found, continue build."
          else
            echo "Failed to query release status (HTTP $status_code)." >&2
            cat /tmp/release_check.json >&2 || true
            exit 1
          fi

      - name: Skip when release exists
        if: steps.release_exists.outputs.exists == 'true'
        run: echo "No new upstream release to process."

      - name: Setup Python
        if: steps.release_exists.outputs.exists != 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          pip install -e .

      - name: Download source data files
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          chmod +x ./download_mmdb.sh
          ./download_mmdb.sh data

      - name: Validate downloaded source files
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          for f in \
            data/GeoLite2-City.mmdb \
            data/GeoLite2-Country.mmdb \
            data/GeoLite2-ASN.mmdb \
            data/GeoCN.mmdb \
            data/provinces.json \
            data/cities.json \
            data/areas.json; do
            test -s "$f" || { echo "::error::$f is missing or empty"; exit 1; }
          done
          ls -lh \
            data/GeoLite2-City.mmdb \
            data/GeoLite2-Country.mmdb \
            data/GeoLite2-ASN.mmdb \
            data/GeoCN.mmdb \
            data/provinces.json \
            data/cities.json \
            data/areas.json

      - name: Convert to source text files
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          python -m ip2region_xdb \
            --city data/GeoLite2-City.mmdb \
            --country data/GeoLite2-Country.mmdb \
            --asn data/GeoLite2-ASN.mmdb \
            --geocn data/GeoCN.mmdb \
            --internal data/内网IP.txt \
            --output data

      - name: Build ip2region maker image
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          rm -rf /tmp/ip2region-maker-src
          git clone --depth 1 --branch master https://github.com/lionsoul2014/ip2region.git /tmp/ip2region-maker-src
          docker build -t local/ip2region-maker:latest /tmp/ip2region-maker-src/maker/golang

      - name: Build IPv4 xdb
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          output=$(docker run --rm --user "$(id -u):$(id -g)" -v "$(pwd)/data:/app/data" local/ip2region-maker:latest \
            gen --src=/app/data/ipv4_source.txt \
                --dst=/app/data/ip2region_v4.xdb \
                --version=ipv4 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qi "failed\|error\|panic"; then
            echo "::error::IPv4 xdb build failed"
            exit 1
          fi

      - name: Build IPv6 xdb
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          output=$(docker run --rm --user "$(id -u):$(id -g)" -v "$(pwd)/data:/app/data" local/ip2region-maker:latest \
            gen --src=/app/data/ipv6_source.txt \
                --dst=/app/data/ip2region_v6.xdb \
                --version=ipv6 2>&1) || true
          echo "$output"
          if echo "$output" | grep -qi "failed\|error\|panic"; then
            echo "::error::IPv6 xdb build failed"
            exit 1
          fi

      - name: Verify IPv4 xdb
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          docker run --rm --user "$(id -u):$(id -g)" -v "$(pwd)/data:/app/data" local/ip2region-maker:latest \
            bench --db=/app/data/ip2region_v4.xdb \
                  --src=/app/data/ipv4_source.txt \
                  --version=ipv4

      - name: Verify IPv6 xdb
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          docker run --rm --user "$(id -u):$(id -g)" -v "$(pwd)/data:/app/data" local/ip2region-maker:latest \
            bench --db=/app/data/ip2region_v6.xdb \
                  --src=/app/data/ipv6_source.txt \
                  --version=ipv6

      - name: Validate release artifacts
        if: steps.release_exists.outputs.exists != 'true'
        run: |
          set -euo pipefail
          for f in data/ip2region_v4.xdb data/ip2region_v6.xdb data/ipv4_source.txt data/ipv6_source.txt; do
            test -s "$f" || { echo "::error::$f is missing or empty"; exit 1; }
          done
          # xdb 文件必须大于 1MB，256 字节说明只有 header，构建实际失败了
          for f in data/ip2region_v4.xdb data/ip2region_v6.xdb; do
            size=$(stat -c%s "$f")
            if [ "$size" -lt 1048576 ]; then
              echo "::error::$f is only $size bytes, expected at least 1MB"
              exit 1
            fi
          done
          ls -lh data/ip2region_v4.xdb data/ip2region_v6.xdb data/ipv4_source.txt data/ipv6_source.txt

      - name: Get date
        if: steps.release_exists.outputs.exists != 'true'
        id: date
        run: echo "date=$(date +'%Y-%m-%d')" >> "$GITHUB_OUTPUT"

      - name: Create release
        if: steps.release_exists.outputs.exists != 'true'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.upstream.outputs.upstream_tag }}
          name: ${{ steps.upstream.outputs.upstream_tag }}
          body: |
            Release date: ${{ steps.date.outputs.date }}
            Upstream version: ${{ steps.upstream.outputs.upstream_tag }}
          files: |
            data/ip2region_v4.xdb
            data/ip2region_v6.xdb
            data/ipv4_source.txt
            data/ipv6_source.txt
          fail_on_unmatched_files: true

      - name: Prune old releases and tags (keep latest 2)
        if: steps.release_exists.outputs.exists != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          repo_api="https://api.github.com/repos/${{ github.repository }}"
          api_headers=(
            -H "Accept: application/vnd.github+json"
            -H "Authorization: Bearer ${GH_TOKEN}"
          )

          api() {
            curl -fsSL "${api_headers[@]}" "$@"
          }

          keep_tag() {
            printf '%s\n' "$keep_tags" | grep -Fxq "$1"
          }

          delete_tag_ref() {
            local tag_name="$1" encoded_tag status_code
            encoded_tag="$(jq -rn --arg v "$tag_name" '$v|@uri')"
            status_code="$(curl -sS -o /tmp/delete_tag_response.json -w '%{http_code}' \
              -X DELETE \
              "${api_headers[@]}" \
              "${repo_api}/git/refs/tags/${encoded_tag}")"

            case "$status_code" in
              204)
                ;;
              404)
                echo "Tag $tag_name already absent."
                ;;
              *)
                echo "Failed to delete tag $tag_name (HTTP $status_code)." >&2
                cat /tmp/delete_tag_response.json >&2 || true
                exit 1
                ;;
            esac
          }

          current_tag="${{ steps.upstream.outputs.upstream_tag }}"
          release_tags="$(api "${repo_api}/releases?per_page=100" \
            | jq -r '.[]?.tag_name | select(test("^[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}$"))')"
          keep_tags="$(printf '%s\n%s\n' "$release_tags" "$current_tag" \
            | awk 'NF' \
            | sort -ru \
            | head -n 2)"

          if [ -z "$keep_tags" ]; then
            echo "No managed release tags found to prune."
            exit 0
          fi

          echo "Keeping release tags:"
          printf '%s\n' "$keep_tags" | sed 's/^/- /'

          api "${repo_api}/releases?per_page=100" \
            | jq -r '.[]? | "\(.id)\t\(.tag_name)"' \
            | while IFS=$'\t' read -r release_id tag_name; do
                [ -z "$release_id" ] && continue
                if keep_tag "$tag_name"; then
                  echo "Keeping release id=$release_id tag=$tag_name"
                  continue
                fi
                echo "Deleting release id=$release_id tag=$tag_name"
                curl -fsS -X DELETE "${api_headers[@]}" "${repo_api}/releases/${release_id}"
              done

          api "${repo_api}/tags?per_page=100" \
            | jq -r '.[]?.name | select(test("^[0-9]{4}\\.[0-9]{2}\\.[0-9]{2}$"))' \
            | while IFS= read -r tag_name; do
                [ -z "$tag_name" ] && continue
                if keep_tag "$tag_name"; then
                  echo "Keeping tag $tag_name"
                  continue
                fi
                echo "Deleting tag $tag_name"
                delete_tag_ref "$tag_name"
              done
